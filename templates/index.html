<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic Violation Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🚦 Traffic Violation Detection System</h1>
    <p>Using YOLOv8 for Helmet Detection</p>

    <div class="tabs">
        <button class="tab-link" onclick="openTab(event,'image-tab')">🖼 Image</button>
        <button class="tab-link" onclick="openTab(event,'video-tab')">📹 Video</button>
        <button class="tab-link" onclick="openTab(event,'webcam-tab')">📷 Webcam</button>
    </div>

    <!-- IMAGE -->
    <div id="image-tab" class="tab-content">
        <h2>Upload Image</h2>

        <label>Confidence:
            <span id="image-conf-value">0.25</span>
        </label>
        <input type="range" id="image-conf" class="conf-slider" min="0.05" max="1" step="0.05" value="0.25">

        <form id="image-form" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <button type="submit">Detect Violations</button>
        </form>

        <div id="image-results"></div>
    </div>

    <!-- VIDEO -->
    <div id="video-tab" class="tab-content">
        <h2>Upload Video</h2>

        <label>Confidence:
            <span id="video-conf-value">0.25</span>
        </label>
        <input type="range" id="video-conf" class="conf-slider" min="0.05" max="1" step="0.05" value="0.25">

        <form id="video-form" enctype="multipart/form-data">
            <input type="file" name="video" required>
            <button type="submit">Process Video</button>
        </form>

        <div id="video-results"></div>
    </div>

    <!-- WEBCAM -->
    <div id="webcam-tab" class="tab-content">
        <h2>Webcam</h2>

        <label>Confidence:
            <span id="webcam-conf-value">0.25</span>
        </label>
        <input type="range" id="webcam-conf" class="conf-slider" min="0.05" max="1" step="0.05" value="0.25">

        <br><br>
        <button id="start-webcam">Start</button>
        <button id="stop-webcam" style="display:none;">Stop</button>

        <div id="webcam-feed-container" style="display:none;">
            <img id="webcam-feed">
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
