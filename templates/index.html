<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Violation Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚦 Traffic Violation Detection System</h1>
            <p>Using YOLOv8 for Real-Time Helmet Detection</p>
        </header>

        <div class="tabs">
            <button class="tab-link active" onclick="openTab(event, 'image-tab')">🖼️ Image Detection</button>
            <button class="tab-link" onclick="openTab(event, 'video-tab')">📹 Video Detection</button>
            <button class="tab-link" onclick="openTab(event, 'webcam-tab')">📷 Webcam Detection</button>
        </div>

        <!-- Image Detection Tab -->
        <div id="image-tab" class="tab-content active">
            <h2>Upload an Image</h2>
            <form id="image-form" action="/detect_image" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="image-conf">Confidence Threshold: <span id="image-conf-value">0.25</span></label>
                    <input type="range" id="image-conf" name="confidence" min="0.1" max="1.0" step="0.05" value="0.25" class="conf-slider">
                </div>
                <input type="file" name="image" accept="image/*" required>
                <button type="submit">Detect Violations</button>
            </form>
            <div id="image-results" class="results-area">
                <!-- Results will be loaded here via AJAX -->
            </div>
        </div>

        <!-- Video Detection Tab -->
        <div id="video-tab" class="tab-content">
            <h2>Upload a Video</h2>
            <form id="video-form" action="/detect_video" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="video-conf">Confidence Threshold: <span id="video-conf-value">0.25</span></label>
                    <input type="range" id="video-conf" name="confidence" min="0.1" max="1.0" step="0.05" value="0.25" class="conf-slider">
                </div>
                <input type="file" name="video" accept="video/*" required>
                <button type="submit">Process Video</button>
            </form>
            <div id="video-results" class="results-area">
                <!-- Video player will be shown here -->
            </div>
        </div>

        <!-- Webcam Detection Tab -->
        <div id="webcam-tab" class="tab-content">
            <h2>Live Webcam Feed</h2>
             <div class="form-group">
                <label for="webcam-conf">Confidence Threshold: <span id="webcam-conf-value">0.25</span></label>
                <input type="range" id="webcam-conf" name="confidence" min="0.1" max="1.0" step="0.05" value="0.25" class="conf-slider">
            </div>
            <button id="start-webcam">Start Webcam</button>
            <button id="stop-webcam" style="display:none;">Stop Webcam</button>
            <div id="webcam-feed-container" class="results-area" style="display:none;">
                <img id="webcam-feed" src="" alt="Webcam Feed">
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
